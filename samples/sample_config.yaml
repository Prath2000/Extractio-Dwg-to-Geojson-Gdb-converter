# ============================================================
# extractio — Sample Configuration
# ============================================================
# Copy this file to config.yaml and replace every value that
# is marked [EDIT] with your own project data.
# Everything else is working syntax you can keep, remove, or extend.
#
# DWG aliases (short names → file paths) live in dwg_paths.yaml.
# That file is gitignored because it contains machine-specific paths.
# Copy sample_dwg_paths.yaml to get started.
#
# Advanced features quick-reference:
#   inherits: base.yaml           — merge a parent config (child wins)
#   global.layer_library          — reusable layer templates
#   common_fields.inject_position — first | last | after:FieldName
#   common_fields.field_overrides — always-stamp, layer cannot override
#   common_fields.exclude_fields  — never inject on any layer
#   fields.resolver               — try multiple sources, first non-null wins
#   expect.min_features           — post-extraction count validation
#   $VAR or ${VAR}                — substituted from .env in same folder
# ============================================================

global:
  project_name: MyProject               # [EDIT]
  crs: "EPSG:32632"                     # [EDIT] UTM EPSG code for your area
  output_dir: "./outputs"               # [EDIT] folder created automatically

  # Output format — geojson (default) or gdb (File Geodatabase, requires fiona + GDAL 3.6+)
  # Override at runtime with: --output-format gdb
  # output_format: geojson              # [EDIT] uncomment and set to "gdb" if needed
  # gdb_name: MyProject.gdb            # [EDIT] GDB filename; defaults to <project_name>.gdb

  # Keeps machine-specific file paths out of this config.
  dwg_paths_file: dwg_paths.yaml

  # DWG aliases referenced by layers below.
  # These keys must exist in dwg_paths.yaml.
  source_dwgs:
    - drawing_a                         # [EDIT] replace with your DWG alias names
    - drawing_b                         # [EDIT]
    - drawing_c                         # [EDIT] remove if not needed

  # Optional: reorder all layer field lists to match a reference config.
  # field_order_ref: "/path/to/reference_config.yaml"

  # Optional: reusable layer templates — reference with `use: template_name`
  # layer_library:
  #   line_base:
  #     geometry:   line
  #     match_mode: exact
  #     locked:     false

  # Fields stamped on every feature on every layer automatically.
  # Layer-level fields: override these per-layer.
  # inject_position: first (default) | last | after:FieldName
  # field_overrides: always stamp — layer fields cannot override
  # exclude_fields:  never inject these on any layer
  common_fields:
    Project_Name: "My Project"          # [EDIT]
    Organisation: "My Organisation"     # [EDIT]
    Prepared_By:  "GIS Team"            # [EDIT]
    Status:       "Draft"               # [EDIT]
    # inject_position: first
    # field_overrides:
    #   Status: "As-Built"
    # exclude_fields:
    #   - Prepared_By

  # Fields left null at extraction time — filled from an external system later.
  deferred_fields:
    - Verified_By                       # [EDIT] list any fields to defer
    - Approved_By

  # Named geometry calculations — reference in any layer with {calculate: <name>}
  calculated_fields:
    Area_Ha:      {formula: area,      unit: hectares, round: 2}
    Area_Sqm:     {formula: area,      unit: sqm,      round: 2}
    Perimeter_Km: {formula: perimeter, unit: km,       round: 2}
    Length_m:     {formula: length,    unit: meters,   round: 2}
    Length_Km:    {formula: length,    unit: km,       round: 2}

  # Auto-numbering pattern for Connection_ID on every feature.
  # Available vars: {plot_name}  {code}  {seq:02d}
  Unique_id:
    pattern: "Unique ID Pattern"   # [EDIT] add a prefix if needed

  # Spatial reference config — fixed internal key name "block_no".
  # primary_source:   read by {spatial_join: primary}
  # secondary_source: read by {spatial_join: secondary}
  block_no:
    primary_source:
      from_dwg:   [drawing_a, drawing_b]      # [EDIT] DWG aliases that hold the labels
      from_layer: "ZONE-LABELS"               # [EDIT] CAD layer containing text labels
      fallbacks:  ["Zone Labels", "LABELS"]   # [EDIT] alternate spellings to try
      from_field: "Contents"
      method:     nearest
    secondary_source:
      from_layer: "Zone Boundaries"           # must match a layer name: below exactly
      from_field: "Zone_ID"
      method:     nearest


# ============================================================
# LAYERS
# ============================================================
# Each entry produces one GeoJSON file.
# Layers run in YAML list order.
# Locked layers are skipped during --run all.
# ============================================================

layers Examples:

  # ----------------------------------------------------------
  # 1. ZONE BOUNDARIES  (polygon — spatial reference layer)
  #
  # role: spatial_reference marks this as the zone grid.
  # It is loaded first; all other layers use it for spatial joins.
  # Exactly one layer should carry this role.
  #
  # merge_sources pulls polygons from multiple DWGs into one
  # output file. Each source gets a sub_plot label on its features.
  # ----------------------------------------------------------
  - name:         "Zone Boundaries"    # [EDIT] your layer name
    role:         spatial_reference
    locked:       false
    cli_aliases:  ["zb", "zones"]      # [EDIT] short aliases for --layers / --unlock
    source_dwg:   drawing_a            # [EDIT] used for pre-flight name validation
    source_layer: "ZONE-BOUNDARY"      # [EDIT] exact AutoCAD layer name
    merge_sources:
      - source_dwg:   drawing_a
        sub_plot:     "A"              # [EDIT] label for features from this DWG
        source_layer: "ZONE-BOUNDARY"  # [EDIT]
        fallbacks:    ["ZONE_BOUNDARY", "Zone Boundary"]  # [EDIT] alternate names
      - source_dwg:   drawing_b
        sub_plot:     "B"              # [EDIT]
        source_layer: "ZONE-BOUNDARY"  # [EDIT]
        fallbacks:    ["ZONE_BOUNDARY", "Zone Boundary"]
    match_mode:   exact
    geometry:     polygon
    code:         "ZB"                 # [EDIT] short code used in Connection_ID
    output:       "zone_boundaries.geojson"
    expect:
      min_features: 1                  # warn if extraction returned nothing
    fields:
      # ── Fields you define. Names and values are entirely yours. ──
      Code:           null             # [EDIT] e.g. a static reference code string
      Category:       "Zone"           # [EDIT] or remove
      Sub_Plot:       {from_merge_source: sub_plot}    # label from merge_sources above
      Zone_ID:        {spatial_join: primary}          # stamped from text labels
      Area_Ha:        {calculate: Area_Ha}
      Perimeter_Km:   {calculate: Perimeter_Km}
      Owner:          null             # [EDIT] or remove
      Remarks:        null             # [EDIT] or remove

  # ----------------------------------------------------------
  # 2. SITE BOUNDARY  (polygon — dissolved from Layer 1)
  #
  # derive_from: spatial_reference dissolves the outer shell of
  # Zone Boundary polygons. No separate DWG source is needed.
  # One dissolved polygon is produced per unique sub_plot.
  # Requires:  pip install shapely
  # ----------------------------------------------------------
  - name:         "Site Boundary"      # [EDIT]
    derive_from:  spatial_reference
    locked:       false
    cli_aliases:  ["sb", "site"]
    merge_sources:
      - source_dwg:   drawing_a
        sub_plot:     "A"
        source_layer: "ZONE-BOUNDARY"
      - source_dwg:   drawing_b
        sub_plot:     "B"
        source_layer: "ZONE-BOUNDARY"
    geometry:     polygon
    code:         "SB"
    output:       "site_boundary.geojson"
    fields:
      Code:           null             # [EDIT]
      Category:       "Site"           # [EDIT] or remove
      Area_Ha:        {calculate: Area_Ha}
      Perimeter_Km:   {calculate: Perimeter_Km}
      Owner:          null
      Remarks:        null

  # ----------------------------------------------------------
  # 3. POINT LAYER  (point — INSERT block entities)
  #
  # geometry_params.only_insert: accept only INSERT (block) entities;
  # skip any TEXT or POINT entities on the same CAD layer.
  # geometry_params.block_name: filter by block definition name
  # (leave blank / remove to accept any INSERT on the layer).
  #
  # from_attr reads a named attribute tag value from each block.
  # resolver: walks a list of sources and returns the first non-null.
  # ----------------------------------------------------------
  - name:         "Point Layer"        # [EDIT] e.g. "Equipment", "Structures"
    locked:       false
    cli_aliases:  ["pts", "points"]    # [EDIT]
    source_dwg:   drawing_a            # [EDIT]
    source_layer: "POINT-LAYER"        # [EDIT] exact AutoCAD layer name
    merge_sources:
      - source_dwg:   drawing_a
        sub_plot:     "A"
        source_layer: "POINT-LAYER"    # [EDIT]
      - source_dwg:   drawing_b
        sub_plot:     "B"
        source_layer: "POINT-LAYER"    # [EDIT]
    match_mode:   exact
    geometry:     point
    geometry_params:
      only_insert: true
      block_name:  "BLOCK_NAME"        # [EDIT] or remove to accept any INSERT
    code:         "PT"                 # [EDIT]
    output:       "point_layer.geojson"
    expect:
      min_features: 1
    fields:
      Code:       null                 # [EDIT]
      Category:   "Point"             # [EDIT]
      Sub_Plot:   {from_merge_source: sub_plot}
      # resolver chain: try a block attribute first, fall back to spatial join
      Zone_ID:
        resolver:
          - type: from_attr
            tag:  ZONE_TAG             # [EDIT] attribute tag name in the CAD block
          - type: spatial_join
            source: primary
          - type: fallback
            value: null
      # Block attribute fields — tag name (right) comes from AutoCAD block definition
      Attribute_1:  {from_attr: "TAG_1"}   # [EDIT] field name and tag name
      Attribute_2:  {from_attr: "TAG_2"}   # [EDIT]
      Attribute_3:  {from_attr: "TAG_3"}   # [EDIT] remove if not needed
      Notes:        null

  # ----------------------------------------------------------
  # 4. LINE LAYER  (line — LWPOLYLINE / LINE entities)
  #
  # merge_sources pulls from multiple DWGs and tags each feature
  # with its sub_plot. fallbacks handle alternate layer names
  # across DWG revisions.
  # ----------------------------------------------------------
  - name:         "Line Layer"         # [EDIT] e.g. "Routes", "Cables", "Pipelines"
    locked:       false
    cli_aliases:  ["ln", "lines"]      # [EDIT]
    source_dwg:   drawing_c            # [EDIT]
    source_layer: "LINE-LAYER"         # [EDIT] exact AutoCAD layer name
    merge_sources:
      - source_dwg:   drawing_c
        sub_plot:     "A"
        source_layer: "LINE-LAYER"     # [EDIT]
        fallbacks:    ["LINE_LAYER"]   # [EDIT] alternate spellings
      - source_dwg:   drawing_c
        sub_plot:     "B"
        source_layer: "LINE-LAYER"     # [EDIT]
    match_mode:   exact
    geometry:     line
    code:         "LN"                 # [EDIT]
    output:       "line_layer.geojson"
    fields:
      Code:       null                 # [EDIT]
      Category:   "Line"              # [EDIT]
      Sub_Plot:   {from_merge_source: sub_plot}
      Zone_ID:    {spatial_join: primary}
      Sub_Type:   {from_merge_source: layer_subtype}   # detected from layer name suffix
      Length_m:   {calculate: Length_m}
      Length_Km:  {calculate: Length_Km}
      Notes:      null

  # ----------------------------------------------------------
  # 5. POLYGON LAYER  (polygon — prefix match, multiple sub-types)
  #
  # match_mode: prefix captures all CAD layers whose name starts
  # with source_layer (e.g. "POLY-LAYER" captures POLY-LAYER-A,
  # POLY-LAYER-B, etc.). from_merge_source: layer_subtype stamps
  # the suffix (A, B, ...) onto each feature automatically.
  # ----------------------------------------------------------
  - name:         "Polygon Layer"      # [EDIT] e.g. "Areas", "Zones", "Parcels"
    locked:       false
    cli_aliases:  ["pl", "polys"]      # [EDIT]
    source_dwg:   drawing_a            # [EDIT]
    source_layer: "POLY-LAYER"         # [EDIT] prefix — captures POLY-LAYER-*, etc.
    match_mode:   prefix
    geometry:     polygon
    code:         "PL"                 # [EDIT]
    output:       "polygon_layer.geojson"
    # geometry_params:
    #   min_area_sqm: 10.0             # uncomment to filter out small annotation polygons
    fields:
      Code:       null                 # [EDIT]
      Category:   "Polygon"           # [EDIT]
      Zone_ID:    {spatial_join: secondary}
      Sub_Type:   {from_merge_source: layer_subtype}   # detected from layer suffix
      Area_Ha:    {calculate: Area_Ha}
      Perimeter_Km: {calculate: Perimeter_Km}
      Notes:      null
