# ============================================================
# extractio — Sample Configuration
# ============================================================
# Copy this file to config.yaml and fill in all values marked
# with [EDIT].  Everything else is working syntax you can keep,
# remove, or extend.
#
# DWG aliases (short names → file paths) live in dwg_paths.yaml.
# That file is gitignored because it contains machine-specific
# absolute paths.  Copy sample_dwg_paths.yaml to get started.
#
# Advanced features quick-reference:
#   inherits: base.yaml           — merge a parent config (child wins)
#   global.layer_library          — reusable layer templates
#   common_fields.inject_position — first | last | after:FieldName
#   common_fields.field_overrides — always-stamp, layer cannot override
#   common_fields.exclude_fields  — never inject on any layer
#   fields.resolver               — try multiple sources, first non-null wins
#   expect.min_features           — post-extraction count validation
#   $VAR or ${VAR}                — substituted from .env in same folder
# ============================================================

global:
  project_name: MyProject_Z1            # [EDIT] shown in version labels
  crs: "EPSG:32632"                     # [EDIT] UTM zone for your area
  output_dir: "./outputs"               # [EDIT] created automatically

  # Keeps machine-specific paths out of this file.
  dwg_paths_file: dwg_paths.yaml

  # DWG aliases referenced by layers below.
  # List form: paths are resolved from dwg_paths_file.
  source_dwgs:
    - layout_z1a
    - layout_z1b
    - routes_z1

  # Optional: reorder all layer field lists to match a reference config.
  # field_order_ref: "/path/to/reference_config.yaml"

  # Optional: reusable layer templates — reference with `use: template_name`
  # layer_library:
  #   line_base:
  #     geometry:   line
  #     match_mode: exact
  #     locked:     false

  # Fields stamped on every feature on every layer automatically.
  # Layer-specific fields: sections override these.
  # inject_position: first (default) | last | after:FieldName
  # field_overrides: always stamp — layer fields cannot override
  # exclude_fields:  never inject these on any layer
  common_fields:
    Project_Name: "My Project"          # [EDIT]
    Organisation: "My Organisation"     # [EDIT]
    Prepared_By:  "GIS Team"            # [EDIT]
    Status:       "Draft"
    # inject_position: first
    # field_overrides:
    #   Status: "As-Built"
    # exclude_fields:
    #   - Prepared_By

  # Fields left null at extraction time — filled later from an external system.
  deferred_fields:
    - Verified_By
    - Approved_By
    - Asset_ID_External

  # Named geometry calculations — reference in any layer with {calculate: <name>}
  calculated_fields:
    Area_Ha:      {formula: area,      unit: hectares, round: 2}
    Area_Sqm:     {formula: area,      unit: sqm,      round: 2}
    Perimeter_Km: {formula: perimeter, unit: km,       round: 2}
    Length_m:     {formula: length,    unit: meters,   round: 2}
    Length_Km:    {formula: length,    unit: km,       round: 2}

  # Auto-numbering pattern for Connection_ID on every feature.
  # Available vars: {plot_name}  {code}  {seq:02d}
  connection_id:
    pattern: "PRJ_{plot_name}_{code}_{seq:02d}"   # [EDIT prefix]

  # Spatial reference config — fixed internal key "block_no".
  # primary_source:   read by {spatial_join: primary}
  # secondary_source: read by {spatial_join: secondary}
  block_no:
    primary_source:
      from_dwg:   [layout_z1a, layout_z1b]         # [EDIT] DWG aliases to scan
      from_layer: "ZONE-LABELS"                     # [EDIT] CAD layer with text labels
      fallbacks:  ["Zone Labels", "ZONE_LABELS"]    # alternate layer name spellings
      from_field: "Contents"
      method:     nearest
    secondary_source:
      from_layer: "Zone Boundaries"                 # must match a layer name: below
      from_field: "Zone_ID"
      method:     nearest


# ============================================================
# LAYERS
# ============================================================
# Each entry produces one GeoJSON file.
# Run order matches the YAML list order.
# Locked layers are skipped during --run all.
# ============================================================

layers:

  # ----------------------------------------------------------
  # 1. ZONE BOUNDARIES  (polygon — spatial reference)
  #
  # The spatial reference layer is loaded first.  Its polygons
  # form the zone grid used by spatial_join on all other layers.
  # role: spatial_reference must appear on exactly one layer.
  #
  # merge_sources combines polygons from multiple DWGs into
  # one output file, tagging each feature with its sub_plot.
  # ----------------------------------------------------------
  - name:         "Zone Boundaries"
    role:         spatial_reference     # enables zone join cache + site boundary dissolve
    locked:       false
    cli_aliases:  ["zb", "zones"]
    source_dwg:   layout_z1a           # [EDIT] used for pre-flight layer name validation
    source_layer: "ZONE-BOUNDARY"      # [EDIT] exact AutoCAD layer name
    merge_sources:
      - source_dwg:   layout_z1a
        sub_plot:     "Z1a"            # [EDIT] label stamped on features from this DWG
        source_layer: "ZONE-BOUNDARY"
        fallbacks:    ["ZONE_BOUNDARY", "Zone Boundary", "ZONES"]
      - source_dwg:   layout_z1b
        sub_plot:     "Z1b"            # [EDIT]
        source_layer: "ZONE-BOUNDARY"
        fallbacks:    ["ZONE_BOUNDARY", "Zone Boundary", "ZONES"]
    match_mode:   exact
    geometry:     polygon
    code:         "ZB"
    output:       "zone_boundaries.geojson"
    expect:
      min_features: 1                  # warn if nothing was extracted
    fields:
      Code:           "PRJ_Z1_ZB"      # [EDIT]
      Classification: "Zone Boundaries"
      Sub_Plot:       {from_merge_source: sub_plot}
      Zone_ID:        {spatial_join: primary}
      Area_Ha:        {calculate: Area_Ha}
      Area_Sqm:       {calculate: Area_Sqm}
      Perimeter_Km:   {calculate: Perimeter_Km}
      Owner:          null
      Remarks:        null

  # ----------------------------------------------------------
  # 2. SITE BOUNDARY  (polygon — derived by dissolving Layer 1)
  #
  # derive_from: spatial_reference dissolves the outer shell of
  # Zone Boundary polygons — no separate DWG source needed.
  # One dissolved polygon is produced per unique sub_plot value.
  # Requires: pip install shapely
  # ----------------------------------------------------------
  - name:         "Site Boundary"
    derive_from:  spatial_reference
    locked:       false
    cli_aliases:  ["sb", "site"]
    merge_sources:
      - source_dwg:   layout_z1a
        sub_plot:     "Z1a"
        source_layer: "ZONE-BOUNDARY"
      - source_dwg:   layout_z1b
        sub_plot:     "Z1b"
        source_layer: "ZONE-BOUNDARY"
    geometry:     polygon
    code:         "SB"
    output:       "site_boundary.geojson"
    fields:
      Code:           "PRJ_Z1_SB"
      Classification: "Site Boundary"
      Area_Ha:        {calculate: Area_Ha}
      Perimeter_Km:   {calculate: Perimeter_Km}
      Owner:          null
      Remarks:        null

  # ----------------------------------------------------------
  # 3. ASSETS  (point — INSERT block with attributes)
  #
  # geometry_params.only_insert: skip text/POINT entities on
  # the same layer; accept only block INSERT entities.
  # geometry_params.block_name: accept only INSERTs whose block
  # definition name matches this string (leave blank for any).
  #
  # from_attr reads a named attribute tag from each block.
  # resolver: tries multiple sources in order; first non-null wins.
  # ----------------------------------------------------------
  - name:         "Assets"
    locked:       false
    cli_aliases:  ["as", "assets"]
    source_dwg:   layout_z1a           # [EDIT]
    source_layer: "ASSET-SYM"         # [EDIT] exact AutoCAD layer name
    merge_sources:
      - source_dwg:   layout_z1a
        sub_plot:     "Z1a"
        source_layer: "ASSET-SYM"
      - source_dwg:   layout_z1b
        sub_plot:     "Z1b"
        source_layer: "ASSET-SYM"
    match_mode:   exact
    geometry:     point
    geometry_params:
      only_insert: true
      block_name:  "ASSET_BLOCK"       # [EDIT] or remove to accept any INSERT
    code:         "AS"
    output:       "assets.geojson"
    expect:
      min_features: 1
    fields:
      Code:           "PRJ_Z1_AS"
      Classification: "Assets"
      Sub_Plot:       {from_merge_source: sub_plot}
      # resolver chain: try block attribute first, fall back to spatial join
      Zone_ID:
        resolver:
          - type: from_attr
            tag:  ZONE_ID              # [EDIT] attribute tag name in AutoCAD block
          - type: spatial_join
            source: primary
          - type: fallback
            value: null
      Connection_ID:  {auto_sequence: true}
      Asset_Type:     {from_attr: "TYPE"}      # [EDIT] block attribute tag name
      Asset_Ref:      {from_attr: "REF"}       # [EDIT]
      Capacity:       {from_attr: "CAPACITY"}  # [EDIT] remove if not applicable
      Install_Date:   null
      Remarks:        null

  # ----------------------------------------------------------
  # 4. ROUTES  (line — LWPOLYLINE / LINE entities)
  #
  # merge_sources pulls from two DWGs and tags each feature
  # with its sub_plot.  fallbacks handle alternate layer names
  # across DWG revisions.
  # ----------------------------------------------------------
  - name:         "Routes"
    locked:       false
    cli_aliases:  ["rt", "routes"]
    source_dwg:   routes_z1            # [EDIT]
    source_layer: "ROUTE-CL"          # [EDIT] exact AutoCAD layer name
    merge_sources:
      - source_dwg:   routes_z1
        sub_plot:     "Z1a"
        sub_type:     "PRIMARY"
        source_layer: "ROUTE-CL"
        fallbacks:    ["ROUTE_CL", "ROUTE-CENTRE"]
      - source_dwg:   routes_z1
        sub_plot:     "Z1b"
        sub_type:     "PRIMARY"
        source_layer: "ROUTE-CL"
    match_mode:   exact
    geometry:     line
    code:         "RT"
    output:       "routes.geojson"
    fields:
      Code:           "PRJ_Z1_RT"
      Classification: "Routes"
      Sub_Plot:       {from_merge_source: sub_plot}
      Zone_ID:        {spatial_join: primary}
      Connection_ID:  {auto_sequence: true}
      Route_Type:     {from_merge_source: layer_subtype}
      Length_m:       {calculate: Length_m}
      Length_Km:      {calculate: Length_Km}
      Surface:        null
      Remarks:        null

  # ----------------------------------------------------------
  # 5. AREAS  (polygon — prefix match captures multiple sub-types)
  #
  # match_mode: prefix captures all CAD layers whose name starts
  # with "AREA-OUTLINE".  Use merge_sources to split sub-types
  # (e.g. AREA-OUTLINE-MAJOR, AREA-OUTLINE-MINOR) and stamp each
  # with its own code and sub_classification.
  # ----------------------------------------------------------
  - name:         "Areas"
    locked:       false
    cli_aliases:  ["ar", "areas"]
    source_dwg:   layout_z1a           # [EDIT]
    source_layer: "AREA-OUTLINE"       # [EDIT] prefix — captures AREA-OUTLINE-*, etc.
    match_mode:   prefix
    geometry:     polygon
    code:         "AR"
    output:       "areas.geojson"
    # geometry_params:
    #   min_area_sqm: 10.0             # uncomment to skip small annotation polygons
    fields:
      Code:           "PRJ_Z1_AR"
      Classification: "Areas"
      Zone_ID:        {spatial_join: secondary}
      Connection_ID:  {auto_sequence: true}
      Area_Type:      {from_merge_source: layer_subtype}  # detected from layer suffix
      Area_Ha:        {calculate: Area_Ha}
      Perimeter_Km:   {calculate: Perimeter_Km}
      Owner:          null
      Remarks:        null
