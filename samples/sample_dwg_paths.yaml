# DWG Paths Registry
# -------------------
# Maps short aliases to absolute file paths.
# Aliases used here must match the keys in source_dwgs: in your config.
#
# THIS FILE IS GITIGNORED — it contains machine-specific paths.
# Copy this file to dwg_paths.yaml and fill in the real paths for your project.
# Never commit dwg_paths.yaml.
#
# Format:
#   alias: "D:/absolute/path/to/file.dwg"
#   alias: null      # null = file not yet received; that DWG is skipped with a warning

# ── Zone 1 layout DWGs ──────────────────────────────────────────────────────────
layout_z1a: "D:/Projects/MyProject/CAD/Z1/Layout/Z1a-Layout-R1.dwg"  # [EDIT]
layout_z1b: "D:/Projects/MyProject/CAD/Z1/Layout/Z1b-Layout-R1.dwg"  # [EDIT]

# ── Routes / networks ───────────────────────────────────────────────────────────
routes_z1:  "D:/Projects/MyProject/CAD/Z1/Routes/Z1-Routes-R1.dwg"   # [EDIT]

