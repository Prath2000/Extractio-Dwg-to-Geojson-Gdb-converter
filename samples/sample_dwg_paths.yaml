# DWG Paths Registry
# -------------------
# Shared by all plot configs.  One entry per DWG alias.
# Format:  alias: "D:/absolute/path/to/file.dwg"
#
# Add this file to .gitignore — it contains machine-specific paths.
# Copy from sample_dwg_paths.yaml and fill in real paths for your project.

# ── Plot P1 ─────────────────────────────────────────────────────────────────────
array_layout_P1a: "D:/Projects/SolarPark/CAD/P1/Array Layout/P1a-Array Layout-R1.dwg"
array_layout_P1b: "D:/Projects/SolarPark/CAD/P1/Array Layout/P1b-Array Layout-R1.dwg"
lt_cable_P1:      "D:/Projects/SolarPark/CAD/P1/LT Cable/P1-LT Cable Routing.dwg"
ht_fo_P1a:        "D:/Projects/SolarPark/CAD/P1/HT Cable/P1a-HT&FO Cable Routing-R1.dwg"
ht_fo_P1b:        "D:/Projects/SolarPark/CAD/P1/HT Cable/P1b-HT&FO Cable Routing-R1.dwg"
pile_layout_P1:   null    # set to null if file not yet received

# ── Plot P2 ─────────────────────────────────────────────────────────────────────
array_layout_P2:  "D:/Projects/SolarPark/CAD/P2/Array Layout/P2-Array Layout-R2.dwg"
