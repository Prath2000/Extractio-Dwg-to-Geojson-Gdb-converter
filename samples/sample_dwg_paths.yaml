# DWG Paths Registry
# -------------------
# Maps short alias names to absolute file paths.
# Alias keys here must match the keys used in source_dwgs: in your config.
#
# THIS FILE IS GITIGNORED — it contains machine-specific absolute paths.
# Copy this file to dwg_paths.yaml and fill in your real paths.
# Never commit dwg_paths.yaml.
#
# Format:
#   alias: "D:/absolute/path/to/file.dwg"
#   alias: null      # null = file not yet received; skipped with a warning at runtime

# [EDIT] Replace aliases and paths with your own DWG files.

drawing_a: "D:/Projects/MyProject/CAD/Drawing-A.dwg"   # [EDIT]
drawing_b: "D:/Projects/MyProject/CAD/Drawing-B.dwg"   # [EDIT]
drawing_c: "D:/Projects/MyProject/CAD/Drawing-C.dwg"   # [EDIT]
# drawing_d: null                                       # not yet received
